name: Pump.fun Data Foundation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pumpfun-foundation:
    name: Pump.fun Dune Veri Keşfi
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}

    steps:
      - name: Repository dosyalarını al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dune API anahtarını doğrula
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DUNE_API_KEY:-}" ]; then
            echo "DUNE_API_KEY GitHub Secret bulunamadı."
            exit 1
          fi

          echo "DUNE_API_KEY mevcut."

      - name: Pump.fun tablolarını ve kolonlarını keşfet
        shell: bash
        run: |
          set -euo pipefail

          python -u scripts/dune_sql_runner.py \
            --sql-file sql/00_discover_pumpfun_tables.sql \
            --output-dir results/pumpfun_foundation/table_discovery \
            --name pumpfun_table_discovery \
            --performance small \
            --timeout-seconds 1800 \
            --poll-seconds 5

      - name: Sonucun eksiksizliğini doğrula
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          result_dir = Path(
              "results/pumpfun_foundation/table_discovery"
          )

          manifest_path = result_dir / "manifest.json"
          rows_path = result_dir / "rows.json"
          csv_path = result_dir / "rows.csv"
          status_path = result_dir / "execution_status.json"

          required_files = [
              manifest_path,
              rows_path,
              csv_path,
              status_path,
          ]

          for path in required_files:
              if not path.is_file():
                  raise SystemExit(
                      f"Gerekli çıktı bulunamadı: {path}"
                  )

          manifest = json.loads(
              manifest_path.read_text(encoding="utf-8")
          )

          if manifest.get("complete") is not True:
              raise SystemExit(
                  "Dune çalışması complete=true değil."
              )

          if manifest.get("partial_results_allowed") is not False:
              raise SystemExit(
                  "Kısmi sonuçlara izin verilmiş."
              )

          actual = manifest.get("row_count")
          expected = manifest.get(
              "expected_total_row_count"
          )

          if actual != expected:
              raise SystemExit(
                  "Sonuç satır sayısı eksik: "
                  f"actual={actual}, expected={expected}"
              )

          if manifest.get("row_count_matches") is not True:
              raise SystemExit(
                  "Manifest satır sayılarının eşleşmediğini bildiriyor."
              )

          print(
              "PUMPFUN_FOUNDATION_VALID | "
              f"rows={actual} | "
              f"execution_id={manifest.get('execution_id')}"
          )
          PY

      - name: Bulunan ilk kayıtları loga yaz
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "results/pumpfun_foundation/"
              "table_discovery/rows.json"
          )

          rows = json.loads(
              path.read_text(encoding="utf-8")
          )

          print(f"DISCOVERY_ROW_COUNT | {len(rows)}")

          for row in rows[:30]:
              print(
                  json.dumps(
                      row,
                      ensure_ascii=False,
                  )
              )
          PY

      - name: Sonuçları artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pumpfun-data-foundation
          path: results/pumpfun_foundation/
          if-no-files-found: error
          retention-days: 14
