name: Pump.fun Migration Remaining 2026

on:
  workflow_dispatch:
    inputs:
      maximum_bytes_billed:
        description: "Her aylık gerçek sorgu için sert üst sınır"
        required: true
        default: "200000000000"
        type: string

permissions:
  contents: read

env:
  GCP_PROJECT_ID: solana-wallet-research

jobs:
  export:
    name: Pump.fun migration ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: "2026-02"
            start_date: "2026-02-01"
            end_date_exclusive: "2026-03-01"
            safe_name: "2026-02"

          - label: "2026-03"
            start_date: "2026-03-01"
            end_date_exclusive: "2026-04-01"
            safe_name: "2026-03"

          - label: "2026-04"
            start_date: "2026-04-01"
            end_date_exclusive: "2026-05-01"
            safe_name: "2026-04"

          - label: "2026-05"
            start_date: "2026-05-01"
            end_date_exclusive: "2026-06-01"
            safe_name: "2026-05"

          - label: "2026-06"
            start_date: "2026-06-01"
            end_date_exclusive: "2026-07-01"
            safe_name: "2026-06"

          - label: "2026-07-01_to_2026-07-18"
            start_date: "2026-07-01"
            end_date_exclusive: "2026-07-19"
            safe_name: "2026-07-01-to-2026-07-18"

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Google Cloud kimlik doğrulaması
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Script ve veri dosyasını doğrula
        run: |
          set -euo pipefail
          test -f scripts/pumpfun_migration_month_export.py
          test -f data/moralis_graduated_mints_2026.csv
          VERSION="$(python scripts/pumpfun_migration_month_export.py --version)"
          echo "Script version: $VERSION"
          test "$VERSION" = "2026-07-20-pumpfun-migration-month-export-v2"

      - name: ${{ matrix.label }} gerçek migration sorgusunu çalıştır
        id: export
        run: |
          set -euo pipefail
          python -u scripts/pumpfun_migration_month_export.py             --project "$GCP_PROJECT_ID"             --start-date "${{ matrix.start_date }}"             --end-date-exclusive "${{ matrix.end_date_exclusive }}"             --label "${{ matrix.label }}"             --moralis-file data/moralis_graduated_mints_2026.csv             --maximum-bytes-billed "${{ inputs.maximum_bytes_billed }}"             --output-dir "artifacts/pumpfun-migration-${{ matrix.safe_name }}"

      - name: ${{ matrix.label }} artifactini yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pumpfun-migrations-${{ matrix.safe_name }}
          path: artifacts/pumpfun-migration-${{ matrix.safe_name }}/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 9
