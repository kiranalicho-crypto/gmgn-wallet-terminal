name: Pump.fun BigQuery Daily Export

on:
  workflow_dispatch:
    inputs:
      scan_date:
        description: "Taranacak UTC tarihi (YYYY-MM-DD)"
        required: true
        default: "2024-01-19"
        type: string

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Google Cloud kimlik doğrulaması
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerekli Python paketlerini kur
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-cloud-bigquery \
            base58

      - name: Pump.fun günlük verisini BigQuery'den çek
        env:
          GCP_PROJECT_ID: solana-wallet-research
          SCAN_DATE: ${{ inputs.scan_date }}
        run: |
          python scripts/pumpfun_bigquery_export.py \
            --project "$GCP_PROJECT_ID" \
            --date "$SCAN_DATE" \
            --output-dir artifacts/pumpfun

      - name: Üretilen dosyaları artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pumpfun-export-${{ inputs.scan_date }}
          path: artifacts/pumpfun/
          if-no-files-found: warn
          retention-days: 30
