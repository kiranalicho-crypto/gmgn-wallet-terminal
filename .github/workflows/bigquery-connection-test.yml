name: BigQuery Connection Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-bigquery:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Google Cloud kimlik doğrulaması
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: BigQuery paketini kur
        run: pip install --disable-pip-version-check google-cloud-bigquery

      - name: BigQuery bağlantısını test et
        env:
          GCP_PROJECT_ID: solana-wallet-research
        run: |
          python - <<'PY'
          import os
          from google.cloud import bigquery

          project_id = os.environ["GCP_PROJECT_ID"]
          client = bigquery.Client(project=project_id)

          sql = """
          SELECT
            table_name
          FROM
            `bigquery-public-data.crypto_solana_mainnet_us.INFORMATION_SCHEMA.TABLES`
          ORDER BY
            table_name
          """

          rows = list(client.query(sql).result())
          table_names = [row.table_name for row in rows]

          expected = {
              "Accounts",
              "Blocks",
              "Instructions",
              "Token Transfers",
              "Tokens",
              "Transactions",
          }

          missing = sorted(expected - set(table_names))

          print(f"BigQuery project: {project_id}")
          print(f"Bulunan tablo sayısı: {len(table_names)}")
          print("Tablolar:")
          for name in table_names:
              print(f"  - {name}")

          if missing:
              raise RuntimeError(
                  "Beklenen Solana tabloları bulunamadı: " + ", ".join(missing)
              )

          print("BIGQUERY_CONNECTION_OK")
          PY
