name: Moralis Graduated History Resume

on:
  workflow_dispatch:
    inputs:
      previous_run_id:
        description: "Önceki Moralis probe GitHub Actions run ID"
        required: true
        default: "29702196829"
        type: string
      additional_pages:
        description: "Önceki cursor'dan itibaren çekilecek en fazla yeni sayfa"
        required: true
        default: "300"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  resume:
    name: Moralis cursor taramasına kaldığı yerden devam et
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Önceki probe artifactını indir
        uses: actions/download-artifact@v4
        with:
          name: moralis-graduated-history-probe-results
          path: artifacts/previous-moralis-probe
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.previous_run_id }}

      - name: Dosya, secret ve önceki artifact kontrolü
        run: |
          set -euo pipefail
          test -f scripts/moralis_graduated_history_probe.py
          test -n "$MORALIS_API_KEY"
          find artifacts/previous-moralis-probe -name moralis_graduated_history_report.json -print -quit | grep -q .

      - name: Probe sürümünü doğrula
        run: |
          set -euo pipefail
          VERSION="$(python scripts/moralis_graduated_history_probe.py --version)"
          echo "Probe version: $VERSION"
          test "$VERSION" = "2026-07-19-moralis-graduated-history-probe-v2"

      - name: Cursor taramasına devam et
        id: history_probe
        continue-on-error: true
        run: |
          set -euo pipefail
          python -u scripts/moralis_graduated_history_probe.py \
            --scope-start-date "2026-01-01" \
            --scope-end-date "2026-07-18" \
            --max-pages "${{ inputs.additional_pages }}" \
            --page-size 100 \
            --resume-dir artifacts/previous-moralis-probe \
            --output-dir artifacts/moralis-graduated-history-probe \
            --strict

      - name: Rapor özetini göster
        if: always() && hashFiles('artifacts/moralis-graduated-history-probe/moralis_graduated_history_report.json') != ''
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("artifacts/moralis-graduated-history-probe/moralis_graduated_history_report.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          print("previous_page_count=", report["resume"]["previous_page_count"])
          print("new_pages_requested=", report["resume"]["new_pages_requested"])
          print("total_pages_requested=", report["pagination"]["pages_requested"])
          print("stop_reason=", report["pagination"]["stop_reason"])
          print("reached_scope_start=", report["pagination"]["reached_scope_start"])
          print("in_scope_graduated_token_count=", report["counts"]["in_scope_graduated_token_count"])
          print("earliest_graduated_at_utc=", report["coverage"]["earliest_graduated_at_utc"])
          print("complete=", report["complete"])
          PY

      - name: Birleşik çıktıları yükle
        if: always() && hashFiles('artifacts/moralis-graduated-history-probe/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: moralis-graduated-history-resumed-results
          path: artifacts/moralis-graduated-history-probe/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Eksiksizlik kapısı
        if: always()
        run: |
          set -euo pipefail
          test "${{ steps.history_probe.outcome }}" = "success"
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("artifacts/moralis-graduated-history-probe/moralis_graduated_history_report.json")
          if not path.is_file():
              raise SystemExit("Moralis resume raporu üretilmedi.")
          report = json.loads(path.read_text(encoding="utf-8"))
          if report.get("complete") is not True:
              raise SystemExit("Moralis, 2026-01-01 sınırına hâlâ ulaşamadı.")
          print("MORALIS_HISTORY_RESUME_GATE_OK")
          PY
