name: Birdeye 83 Wallet Prefilter 2026

on:
  workflow_dispatch:
    inputs:
      safety_threshold_usd:
        description: "On-chain doğrulamaya gönderilecek güvenlik eşiği"
        required: true
        default: "30000"
        type: string
      strict_threshold_usd:
        description: "Resmi Y realized profit eşiği"
        required: true
        default: "50000"
        type: string

permissions:
  contents: read

jobs:
  prefilter:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency
        run: python -m pip install requests

      - name: Validate files and version
        run: |
          set -euo pipefail
          test -f scripts/birdeye_83_wallet_prefilter_2026.py
          test -f data/x_corrected_provisional_seed_v2.csv
          VERSION="$(python scripts/birdeye_83_wallet_prefilter_2026.py --version)"
          echo "Version: $VERSION"
          test "$VERSION" = "2026-07-23-birdeye-83-wallet-prefilter-v2"

      - name: Run Birdeye candidate prefilter
        env:
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${BIRDEYE_API_KEY:-}"
          python -u scripts/birdeye_83_wallet_prefilter_2026.py \
            --input data/x_corrected_provisional_seed_v2.csv \
            --output-dir output-birdeye-83-wallet-prefilter \
            --safety-threshold-usd "${{ inputs.safety_threshold_usd }}" \
            --strict-threshold-usd "${{ inputs.strict_threshold_usd }}" \
            --request-spacing-seconds 3

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: birdeye-83-wallet-prefilter-2026
          path: output-birdeye-83-wallet-prefilter/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Completeness gate
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("output-birdeye-83-wallet-prefilter/birdeye_83_wallet_prefilter_report.json")
          if not path.is_file():
              raise SystemExit("Prefilter report was not produced.")
          report = json.loads(path.read_text(encoding="utf-8"))
          print(json.dumps(report, ensure_ascii=False, indent=2))
          if report.get("complete") is not True:
              raise SystemExit("One or more wallets are incomplete; inspect artifact.")
          print("BIRDEYE_83_WALLET_PREFILTER_OK")
          PY
