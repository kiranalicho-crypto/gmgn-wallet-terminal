name: GMGN Activity Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  activity-probe:
    name: Activity ve Deployer Analizi
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GMGN_API_KEY: ${{ secrets.GMGN_API_KEY }}

    steps:
      - name: Repository dosyalarını al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Secret kontrolü
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GMGN_API_KEY:-}" ]; then
            echo "GMGN_API_KEY GitHub Secret bulunamadı."
            exit 1
          fi

          echo "GMGN_API_KEY mevcut."

      - name: Tam activity geçmişini çek
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/activity_probe.py

      - name: Deployer profilini oluştur
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/deployer_profiler.py

      - name: Çıktıları doğrula
        shell: bash
        run: |
          set -euo pipefail

          REPORT_FILE="$(find results/activity_probe -type f -name 'completeness_report.json' -print -quit)"
          ACTIVITY_FILE="$(find results/activity_probe -type f -name 'all_activities_with_exact_dedup.json' -print -quit)"
          RAW_ACTIVITY_FILE="$(find results/activity_probe -type f -name 'all_activities_raw.json' -print -quit)"
          DEPLOYER_SUMMARY_FILE="$(find results/activity_probe -type f -name 'deployer_summary.json' -print -quit)"
          DEPLOYER_TOKENS_FILE="$(find results/activity_probe -type f -name 'deployer_tokens.json' -print -quit)"
          DEPLOYER_CSV_FILE="$(find results/activity_probe -type f -name 'deployer_tokens.csv' -print -quit)"

          test -n "$REPORT_FILE"
          test -n "$ACTIVITY_FILE"
          test -n "$RAW_ACTIVITY_FILE"
          test -n "$DEPLOYER_SUMMARY_FILE"
          test -n "$DEPLOYER_TOKENS_FILE"
          test -n "$DEPLOYER_CSV_FILE"

          echo "Activity raporu: $REPORT_FILE"
          echo "Activity verisi: $ACTIVITY_FILE"
          echo "Ham activity verisi: $RAW_ACTIVITY_FILE"
          echo "Deployer özeti: $DEPLOYER_SUMMARY_FILE"
          echo "Deployer tokenları: $DEPLOYER_TOKENS_FILE"
          echo "Deployer CSV: $DEPLOYER_CSV_FILE"

          echo "Oluşturulan dosyalar:"
          find results/activity_probe -maxdepth 5 -type f -print

      - name: Sonuçları artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-activity-probe-results
          path: results/activity_probe/
          if-no-files-found: error
          retention-days: 14
