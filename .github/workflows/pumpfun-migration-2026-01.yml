name: Pump.fun Migration 2026-01

on:
  workflow_dispatch:
    inputs:
      maximum_bytes_billed:
        description: "Bu aylık gerçek sorgu için sert üst sınır"
        required: true
        default: "200000000000"
        type: string

permissions:
  contents: read

env:
  GCP_PROJECT_ID: solana-wallet-research

jobs:
  export:
    name: Pump.fun migration 2026-01
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Google Cloud kimlik doğrulaması
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Script ve veri dosyasını doğrula
        run: |
          set -euo pipefail
          test -f scripts/pumpfun_migration_month_export.py
          test -f data/moralis_graduated_mints_2026.csv
          VERSION="$(python scripts/pumpfun_migration_month_export.py --version)"
          echo "Script version: $VERSION"
          test "$VERSION" = "2026-07-20-pumpfun-migration-month-export-v2"

      - name: 2026-01 gerçek migration sorgusunu çalıştır
        run: |
          set -euo pipefail
          python -u scripts/pumpfun_migration_month_export.py \
            --project "$GCP_PROJECT_ID" \
            --start-date "2026-01-01" \
            --end-date-exclusive "2026-02-01" \
            --label "2026-01" \
            --moralis-file data/moralis_graduated_mints_2026.csv \
            --maximum-bytes-billed "${{ inputs.maximum_bytes_billed }}" \
            --output-dir "artifacts/pumpfun-migration-2026-01"

      - name: Artifact yükle
        if: always() && hashFiles('artifacts/pumpfun-migration-2026-01/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pumpfun-migrations-2026-01
          path: artifacts/pumpfun-migration-2026-01/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
