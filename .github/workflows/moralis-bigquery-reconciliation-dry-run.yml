name: Moralis BigQuery Reconciliation Dry Run

on:
  workflow_dispatch:
    inputs:
      maximum_bytes_billed:
        description: "Gerçek sorgu için sert üst sınır; dry-run yalnız tahmin yapar"
        required: true
        default: "700000000000"
        type: string

permissions:
  contents: read

env:
  GCP_PROJECT_ID: solana-wallet-research

jobs:
  dry-run:
    name: Moralis ve BigQuery karşılaştırma maliyetini ölç
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Google Cloud kimlik doğrulaması
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dosyaları ve script sürümünü doğrula
        run: |
          set -euo pipefail
          test -f scripts/moralis_bigquery_reconciliation.py
          test -f data/moralis_graduated_mints_2026.csv.gz
          VERSION="$(python scripts/moralis_bigquery_reconciliation.py --version)"
          echo "Script version: $VERSION"
          test "$VERSION" = "2026-07-20-moralis-bigquery-reconciliation-v1"

      - name: Yalnızca BigQuery dry-run çalıştır
        run: |
          set -euo pipefail
          python -u scripts/moralis_bigquery_reconciliation.py             --project "$GCP_PROJECT_ID"             --start-date "2026-01-01"             --end-date "2026-07-18"             --moralis-file data/moralis_graduated_mints_2026.csv.gz             --maximum-bytes-billed "${{ inputs.maximum_bytes_billed }}"             --output-dir artifacts/moralis-bigquery-reconciliation-dry-run             --dry-run-only             --strict

      - name: Dry-run çıktısını yükle
        if: always() && hashFiles('artifacts/moralis-bigquery-reconciliation-dry-run/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: moralis-bigquery-reconciliation-dry-run
          path: artifacts/moralis-bigquery-reconciliation-dry-run/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
